name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "✅ google-services.json установлен из секрета"
          elif [ -f "app/google-services.json" ]; then
            echo "✅ google-services.json уже есть в репозитории"
          else
            echo "⚠️  google-services.json отсутствует — создаём заглушку для сборки"
            cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "placeholder-project",
              "storage_bucket": "placeholder-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": { "package_name": "com.novaroject.novtodolist" }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "placeholder_key" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Deploy Firestore Security Rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "Deploying Firestore rules..."
            npx firebase-tools@latest deploy \
              --only firestore:rules \
              --project novto-do-list-92e9e \
              --token "$FIREBASE_TOKEN" \
              --non-interactive
          else
            echo "⚠️  FIREBASE_TOKEN not set — skipping Firestore rules deploy."
            echo "    Get token with: npx firebase-tools login:ci"
            echo "    Add as GitHub Secret: FIREBASE_TOKEN"
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novtodolist-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: novtodolist-release-${{ github.run_number }}
          path: apk/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "novTo-Do List (Build ${{ github.run_number }})"
          body: |
            ## novTo-Do List — сборка ${{ github.run_number }}

            ### Изменения v1.1.0
            - 🔔 Локальные уведомления — напоминание за 30 минут до задачи
            - 🐛 Ошибки Firestore теперь показываются в приложении
            - 🔒 Правила Firestore задеплоены автоматически (если есть FIREBASE_TOKEN)
            - 🎨 Улучшен экран «О приложении»
          files: apk/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
