name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi

      - name: Deploy Firestore Security Rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "Deploying Firestore rules..."
            npx firebase-tools@latest deploy \
              --only firestore:rules \
              --project novto-do-list-92e9e \
              --token "$FIREBASE_TOKEN" \
              --non-interactive
          else
            echo "⚠️  FIREBASE_TOKEN not set — skipping Firestore rules deploy."
            echo "    Add FIREBASE_TOKEN to GitHub Secrets to auto-deploy rules."
            echo "    Get token with: npx firebase-tools login:ci"
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novtodolist-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: novtodolist-release-${{ github.run_number }}
          path: apk/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build${{ github.run_number }}
          name: "novTo-Do List v1.0.0 (Build ${{ github.run_number }})"
          body: |
            ## novTo-Do List — Cyberpunk 2026
            
            ### Изменения
            - 🐛 Исправлен экран «О приложении» (текст больше не налезает)
            - ✨ Новая шапка на экранах Главная / Все задачи
            - 🔒 Правила Firestore (исправлен PERMISSION_DENIED)
            - 🎨 Прогресс-бар и статистика в шапке
          files: apk/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
