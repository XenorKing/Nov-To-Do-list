name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2g"

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novtodolist-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: novtodolist-release-${{ github.run_number }}
          path: apk/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build${{ github.run_number }}
          name: "novTo-Do List v1.0.0 (Build ${{ github.run_number }})"
          body: |
            ## novTo-Do List — Cyberpunk 2026 Release
            
            ### Что нового
            - 🎨 Полный редизайн в стиле киберпанк 2026 (неоновые цвета, анимации)
            - ✨ Анимированная обводка полей авторизации (sweep-анимация по кругу)
            - 🔮 Плавающая нав-панель (3 кнопки: Главная / + / Все задачи)
            - ⏰ Выбор точного времени при создании задачи
            - 🐛 Исправлено создание задач (теперь показывает ошибку если что-то пошло не так)
            - 📱 Экран «О приложении» в стиле NovAnime
            - 🌟 Новая иконка приложения с неоновым свечением
          files: apk/*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
